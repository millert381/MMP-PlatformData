version: "3.9"

services:
  postgres:
    build: .
    container_name: mmp-platform-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../init:/docker-entrypoint-initdb.d
      - ../backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: mmp-pgadmin
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    image: postgres:16
    container_name: mmp-backup
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ../backups:/backups
    entrypoint: >
      bash -c "
      while true; do
        pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB > /backups/backup.sql;
        sleep 86400;
      done"

  restore:
    image: postgres:16
    container_name: mmp-restore
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backups:/backups
    entrypoint: >
      bash -c "
      if [ -f /backups/backup.sql ]; then
        echo 'Restoring database...';
        psql -h postgres -U $$POSTGRES_USER $$POSTGRES_DB < /backups/backup.sql;
      else
        echo 'No backup found, skipping restore.';
      fi
      "

  migrations:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: mmp-migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../:/src
    working_dir: /src
    entrypoint: >
      bash -c "
      dotnet ef database update
      "

volumes:
  pgdata: