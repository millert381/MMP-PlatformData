version: "3.9"

services:
  postgres:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: mmp-platform-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: mmp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backup:
    image: postgres:16
    container_name: mmp-backup
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    entrypoint: >
      bash -c "
      while true; do
        echo 'Running backup...';
        pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB > /backups/backup.sql;
        sleep 86400;
      done"
    restart: unless-stopped

  restore:
    image: postgres:16
    container_name: mmp-restore
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    entrypoint: >
      bash -c "
      if [ -f /backups/backup.sql ]; then
        echo 'Restoring database...';
        psql -h postgres -U $$POSTGRES_USER $$POSTGRES_DB < /backups/backup.sql;
      else
        echo 'No backup found, skipping restore.';
      fi
      "
    restart: "no"

volumes:
  pgdata: